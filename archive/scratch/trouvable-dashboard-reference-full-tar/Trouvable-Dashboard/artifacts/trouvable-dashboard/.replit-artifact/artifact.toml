kind = "web"
previewPath = "/"
title = "Trouvable - Centre de commande"
version = "1.0.0"
id = "artifacts/trouvable-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23276

[services.development]
run = "pnpm --filter @workspace/trouvable-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trouvable-dashboard", "run", "build" ]
publicDir = "artifacts/trouvable-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23276"
BASE_PATH = "/"
